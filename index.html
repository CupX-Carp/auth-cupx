<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | CupX Corporation</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:#e5e7eb;
}

header {
background:#020617;
padding:20px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a {
color:#38bdf8;
text-decoration:none;
font-size:14px;
}

.hamburger{
cursor:pointer;
font-size:20px;
}

.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#020617;
padding:20px;
transition:0.3s;
z-index:1000;
}

.menu.show{
left:0;
}

.menu a{
display:block;
color:#38bdf8;
margin:15px 0;
text-decoration:none;
}

.page{
min-height:calc(100vh - 64px);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
background:#020617;
padding:30px;
width:100%;
max-width:360px;
border-radius:8px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin:0 0 5px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:0.85;
margin:0 0 25px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
background:#1e293b;
border:none;
color:white;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.dashboard{
display:none;
text-align:center;
}

.dashboard button{
margin-top:10px;
}

.logout{
background:#ef4444;
margin-top:15px;
}

</style>
</head>

<body>

<div class="menu" id="menu">
<h3>CupX</h3>

<a href="https://amazx.cupx.in">Amazx</a>
<a href="https://flipx.cupx.in">Flipx</a>
<a href="https://pay.cupx.in">Pay</a>
<a href="https://upi.cupx.in">UPI</a>

<button onclick="logout()" class="logout">Logout</button>

</div>

<header>
<div class="hamburger" onclick="toggleMenu()">☰</div>
<strong>CupX Corporation</strong>
<a href="https://cupx.in">← Home</a>
</header>

<div class="page">

<div class="login-box" id="authBox">

<h1>CupX Login</h1>
<p class="subtitle">Access CupX tools & services</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

<p id="status"></p>

</div>

<div class="login-box dashboard" id="dashboard">

<h2>Welcome</h2>
<p id="userInfo"></p>

<button onclick="openSite('https://amazx.cupx.in')">Open Amazx</button>
<button onclick="openSite('https://flipx.cupx.in')">Open Flipx</button>
<button onclick="openSite('https://pay.cupx.in')">Open Pay</button>
<button onclick="openSite('https://upi.cupx.in')">Open UPI</button>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

<script>

const supabaseUrl = "YOUR_SUPABASE_URL"
const supabaseKey = "YOUR_SUPABASE_ANON_KEY"

const supabaseClient = window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function signup(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient
.from("users")
.insert([{
username:username,
password:password,
upi_id:username+"@cupx",
balance:1000
}])

if(error){
document.getElementById("status").innerText=error.message
}else{
document.getElementById("status").innerText="Signup success"
}

}

async function login(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient
.from("users")
.select("*")
.eq("username",username)
.eq("password",password)
.single()

if(error){
document.getElementById("status").innerText="Login failed"
}else{

localStorage.setItem("cupx_user",JSON.stringify(data))
showDashboard(data)

}

}

function showDashboard(user){

document.getElementById("authBox").style.display="none"
document.getElementById("dashboard").style.display="block"

document.getElementById("userInfo").innerText=
"User: "+user.username+" | UPI: "+user.upi_id

}

function logout(){

localStorage.removeItem("cupx_user")
location.reload()

}

function openSite(url){

window.location.href=url

}

function toggleMenu(){

document.getElementById("menu").classList.toggle("show")

}

const savedUser=JSON.parse(localStorage.getItem("cupx_user"))

if(savedUser){
showDashboard(savedUser)
}

</script>

</body>
</html>
